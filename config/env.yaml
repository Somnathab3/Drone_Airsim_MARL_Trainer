env:
  num_agents: 3  # PHASE 1: Single drone foundation
  agent_name_prefix: "Drone"
  max_steps: 400 # Reduced from 500 to faster fail
  sim_dt: 3.0 # seconds per step (Low frequency control)
  ip: "127.0.0.1"
  port: 41451
  curriculum_2d_mode: false  # If true, locks vz=0 for 2D flocking (Section 3)

  # Curriculum Learning Configuration
  curriculum:
    mode: "mixed" # "adaptive" (success-only), "step" (step-only), or "mixed" (step-based fallback)
    update_interval_steps: 200000 # Increase difficulty every 200k steps (tuned down)
    max_level: 4
    levels:
      0: 
        dist: [15, 25]
        alt: [8, 12]
      1: 
        dist: [25, 40]
        alt: [5, 15]
      2: 
        dist: [40, 60]
        alt: [5, 20]
      3: 
        dist: [60, 80]
        alt: [3, 25]
      4:
        dist: [70, 90]
        alt: [3, 28] # Near max ceiling
  use_pid_assist: true       # Enable PID-assisted hover stabilization
  pid_blend_weight: 0.3      # Blend 30% PID + 70% RL actions (prevents falling)
  action_frequency: 1        # One action per step (Synchronous 3s control)
  # PHASE 1: Simplified action space and global planning
  use_simplified_actions: true   # Use [speed, yaw_rate, climb_rate] instead of [vx, vy, vz, yaw_rate]
  use_global_planner: true        # Use RRT* for global path planning
  # collision_grace_period matches action_frequency automatically (can't move until first action sent)
  
  # Cooperative RL Configuration
  cooperation:
    use_intent_sharing: true      # Explicit neighbor intent features in obs
    use_priority_negotiation: true # Arbitrate right-of-way in high-risk zones
    use_action_shield: false       # Action post-processing for safety (bias vs hard correction)
    shield_threshold_ttc: 3.0      # TTC (s) to trigger action bias
    priority_metric: "dist_to_goal" # Metric for local arbitration
    
  # Communication Model Configuration
  communication:
    drop_prob: 0.1                 # Packet loss probability
    delay_steps: 1                 # Message delay (dt * delay_steps)
    radius: 50.0                   # Max comm distance (m)
    stale_limit: 5                 # Max steps to retain old info if drop occurs
  
  # Action Limits
  min_action_threshold: 0.1  # Deadzone: actions smaller than this (relative) are ignored
  max_action_magnitude: 5.0 # Clip: maximum speed command (m/s) sent to drone

reward:
  R_goal: 100.0
  R_collision: 200.0        # STRONG SIGNAL: Termination event
  alpha: 30.0              # Progress coeff (increased from 20 - stronger signal)
  beta: 0.5                # BALANCED: Reduced from 1.0 but not too weak
  eta: 0.1                 # Time penalty
  gamma: 0.005             # Action magnitude penalty (reduced from 0.01 - was discouraging exploration)
  lambda: 0.1              # Action smoothness penalty (increased from 0.01 to reduce jitter)
  zeta: 1.5                # Heading reward (5x stronger than original 0.3)
  omega: 0.3               # Altitude control reward coefficient (GENTLE - was 2.0, too aggressive)
  d_safe: 1.0              # Increased from 3.0 - give drones more space
  goal_radius: 0.5         # CRITICAL: Reduced from 5.0 to 0.5 for precision
  catastrophic_reward_threshold: -5000.0  # Terminate if cumulative reward drops below this (Relaxed)
  altitude_min: 1.0        # Minimum safe altitude (more permissive - was 3.0)
  altitude_max: 30.0       # Maximum safe altitude (more permissive - was 25.0)
  altitude_preferred_min: 3.0  # Preferred altitude band lower (was 5.0)
  altitude_preferred_max: 25.0 # Preferred altitude band upper (was 20.0)
  
  # Swarm coordination rewards (Section 4.1)
  w_cohesion: 0.05         # Cohesion to centroid weight (Reduced from 0.1)
  w_velocity_align: 0.05   # Velocity alignment weight
  w_ttc: 0.2               # Time-to-collision predictive safety weight
  r_cohesion_max: 20.0     # Maximum distance from centroid before penalty
  ttc_tau: 2.0             # TTC time constant (seconds)
  # PHASE 1: Path planning rewards
  w_path_efficiency: 0.3  # Reward for following planned waypoints
  d_obs_safe: 1.0         # Obstacle safety distance
  w_obs: 0.5              # Obstacle proximity penalty weight
  
  # Cooperative reward weights
  w_coop_resolve: 1.5     # Reward for resolving a conflict (increasing separation)
  w_priority_yield: 1.0   # Reward for yielding correctly (lower priority agent)
  w_team_progress: 5.0    # Team-level collective progress reward
  w_deadlock_penalty: 2.0  # Penalty for non-progressing neighbors (stalling)
  
observation:
  K: 5
  d_ref: 100.0
  d_goal_close: 5.0     # New: For normalizing close-range goal distance (precision)
  v_ref: 10.0
  p_ref: 100.0
  v_ref_rel: 20.0
  R_min: 8.0
  R_gain: 10.0

logging:
  log_dir: "F:/Projects/PhD/Drone_Air_Sim/universal-uav-rl/data/episodes"
  enable: true

debug:
  smoke_test: false # If true, mock AirSim
